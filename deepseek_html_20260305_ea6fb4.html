<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Beyblade X 三語完整查詢 (增強搜尋)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.2s, border-color 0.2s;
        }
        
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #555;
            --text-muted: #888;
            --border-color: #ddd;
            --header-bg: #1e2b3c;
            --header-text: white;
            --card-bg: white;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.05);
            --modal-bg: white;
            --badge-bg: #eef2f5;
            --bx-color: #4a6fa5;
            --ux-color: #b05b5b;
            --cx-color: #5b8c5b;
            --filter-btn-bg: white;
            --filter-btn-text: #1e2b3c;
            --filter-btn-border: #ddd;
            --filter-btn-active-bg: #1e2b3c;
            --filter-btn-active-text: white;
            --stats-bg: white;
            --close-btn-bg: #f0f0f0;
            --lang-tab-bg: #eef2f5;
            --lang-tab-active: #1e2b3c;
            --get-a-bg: #ffd700;
            --get-a-text: #1e2b3c;
            --get-j-bg: #ff6b6b;
            --get-j-text: white;
            --get-box-bg: #4caf50;
            --get-box-text: white;
            --search-tag-bg: #e3f2fd;
            --search-tag-active: #2196f3;
        }
        
        body.dark-mode {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-color: #333;
            --header-bg: #0a0a0a;
            --header-text: #e0e0e0;
            --card-bg: #2d2d2d;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
            --modal-bg: #2d2d2d;
            --badge-bg: #404040;
            --bx-color: #5a8fc9;
            --ux-color: #d47c7c;
            --cx-color: #7cae7c;
            --filter-btn-bg: #2d2d2d;
            --filter-btn-text: #e0e0e0;
            --filter-btn-border: #444;
            --filter-btn-active-bg: #4a6fa5;
            --filter-btn-active-text: white;
            --stats-bg: #2d2d2d;
            --close-btn-bg: #404040;
            --lang-tab-bg: #404040;
            --lang-tab-active: #4a6fa5;
            --get-a-bg: #b8860b;
            --get-a-text: white;
            --get-j-bg: #8b0000;
            --get-j-text: white;
            --get-box-bg: #2e7d32;
            --get-box-text: white;
            --search-tag-bg: #1e3a5f;
            --search-tag-active: #1976d2;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .header h1 span {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        .dark-mode-toggle {
            background: var(--filter-btn-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .lang-bar {
            display: flex;
            gap: 8px;
            margin: 12px 16px;
            flex-wrap: wrap;
        }
        
        .lang-btn {
            background: var(--lang-tab-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            min-width: 80px;
        }
        
        .lang-btn.active {
            background: var(--lang-tab-active);
            color: white;
            border-color: var(--lang-tab-active);
        }
        
        .search-box {
            background: var(--bg-secondary);
            margin: 0 16px 16px;
            padding: 12px 16px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            display: flex;
            border: 1px solid var(--border-color);
        }
        
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            background: transparent;
            color: var(--text-primary);
        }
        
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        
        /* 搜尋標籤 */
        .search-tags {
            display: flex;
            gap: 8px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
        }
        
        .search-tag {
            background: var(--search-tag-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .search-tag.active {
            background: var(--search-tag-active);
            color: white;
            border-color: var(--search-tag-active);
        }
        
        .search-tag .icon {
            font-size: 1.1rem;
        }
        
        .search-tag .clear {
            margin-left: 4px;
            font-size: 1.2rem;
            line-height: 1;
        }
        
        .active-search-info {
            background: var(--badge-bg);
            margin: 0 16px 16px;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .filter-section {
            margin: 0 16px 16px;
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .filter-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        /* 零件篩選行 */
        .part-filter-row {
            display: flex;
            gap: 8px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .part-filter-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 24px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            min-width: 100px;
            text-align: center;
        }
        
        .part-filter-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        /* 入手方式篩選 */
        .get-filter-container {
            display: flex;
            justify-content: flex-end;
            margin: 0 16px 16px;
        }
        
        .get-filter-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .get-filter-button {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        
        .get-filter-button.active {
            background: var(--filter-btn-active-bg);
            color: white;
            border-color: var(--filter-btn-active-bg);
        }
        
        .get-filter-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            z-index: 20;
            min-width: 180px;
            box-shadow: var(--card-shadow);
        }
        
        .get-filter-menu.show {
            display: block;
        }
        
        .get-filter-item {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 30px;
            margin: 4px 0;
            color: var(--text-primary);
        }
        
        .get-filter-item:hover {
            background: var(--badge-bg);
        }
        
        .get-filter-item.active {
            background: var(--filter-btn-active-bg);
            color: white;
        }
        
        .stats {
            background: var(--stats-bg);
            margin: 0 16px 16px;
            padding: 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            min-width: 80px;
        }
        
        .stat-number {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .product-list {
            margin: 0 16px 20px;
        }
        
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            border-left-width: 4px;
            position: relative;
        }
        
        .product-card.BX { border-left-color: var(--bx-color); }
        .product-card.UX { border-left-color: var(--ux-color); }
        .product-card.CX { border-left-color: var(--cx-color); }
        .product-card:active { transform: scale(0.98); background: var(--badge-bg); }
        
        .product-model {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .product-type {
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: normal;
            color: var(--text-primary);
        }
        
        .product-name {
            font-size: 1rem;
            color: var(--text-secondary);
            margin: 4px 0;
        }
        
        .product-name-small {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 4px 0;
        }
        
        .product-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        /* data-get 徽章樣式 */
        .data-get-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 8px;
        }
        
        .data-get-a {
            background: var(--get-a-bg);
            color: var(--get-a-text);
        }
        
        .data-get-j {
            background: var(--get-j-bg);
            color: var(--get-j-text);
        }
        
        .data-get-box {
            background: var(--get-box-bg);
            color: var(--get-box-text);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
            align-items: flex-end;
        }
        
        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.2s;
            color: var(--text-primary);
            border-top: 1px solid var(--border-color);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .close-btn {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            text-align: center;
            line-height: 36px;
            border-radius: 50%;
            background: var(--close-btn-bg);
            color: var(--text-primary);
        }
        
        .detail-section {
            margin: 20px 0;
        }
        
        .detail-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        
        .detail-row {
            display: flex;
            margin: 10px 0;
        }
        
        .detail-label {
            width: 100px;
            color: var(--text-muted);
        }
        
        .detail-value {
            flex: 1;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .blade-row {
            display: flex;
            gap: 16px;
            margin: 12px 0;
            padding: 12px;
            background: var(--badge-bg);
            border-radius: 12px;
        }
        
        .blade-main, .blade-assist {
            flex: 1;
        }
        
        .blade-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .blade-name {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .blade-code {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .lang-tag {
            display: inline-block;
            background: var(--badge-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 4px;
        }
        
        .data-get-info {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .loading-message, .error-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .error-message {
            color: #f44336;
        }
        
        body.dark-mode .error-message {
            color: #ff8a80;
        }
        
        .retry-btn {
            background: var(--filter-btn-active-bg);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-block;
        }
        
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 10px 16px 20px;
        }
        
        .info-box {
            background: var(--badge-bg);
            border-left: 4px solid #4caf50;
            padding: 12px;
            margin: 0 16px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .legend-box {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 16px;
            padding: 8px;
            background: var(--badge-bg);
            border-radius: 30px;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            padding: 4px 8px;
            background: var(--card-bg);
            border-radius: 20px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        
        .legend-color.a { background: var(--get-a-bg); }
        .legend-color.j { background: var(--get-j-bg); }
        .legend-color.box { background: var(--get-box-bg); }
        
        .update-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }
        
        .highlight {
            background-color: #ffeb3b;
            color: #000;
            padding: 2px 0;
            border-radius: 2px;
        }
        
        body.dark-mode .highlight {
            background-color: #ffb300;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>⚙️ Beyblade X 三語查詢 <span>增強搜尋</span></h1>
        </div>
        <button class="dark-mode-toggle" id="darkModeToggle">🌙 深色模式</button>
    </div>
    
    <div class="info-box">
        <strong>🔍 搜尋功能：</strong> 可以搜尋 Blade 名稱、Ratchet 數字、Bit 代碼/名稱
    </div>
    
    <!-- 圖例說明 -->
    <div class="legend-box">
        <div class="legend-item">
            <span class="legend-color a"></span>
            <span>A (App獲得)</span>
        </div>
        <div class="legend-item">
            <span class="legend-color j"></span>
            <span>J (日本限定)</span>
        </div>
        <div class="legend-item">
            <span class="legend-color box"></span>
            <span>×3,×4,×5,×8,×12 (一箱數量)</span>
        </div>
    </div>
    
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="zh">🇨🇳 中文</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="jp">🇯🇵 日本語</button>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="例如: 翔龍、6-60、V、LO、Slash...">
    </div>
    
    <!-- 搜尋標籤 -->
    <div class="search-tags">
        <button class="search-tag" data-search="blade">
            <span class="icon">⚔️</span> Blade名稱
        </button>
        <button class="search-tag" data-search="ratchet">
            <span class="icon">⚙️</span> Ratchet數字
        </button>
        <button class="search-tag" data-search="bit">
            <span class="icon">🔰</span> Bit代碼/名稱
        </button>
        <button class="search-tag" id="clearSearch" style="display: none;">
            <span class="icon">✕</span> 清除
        </button>
    </div>
    
    <!-- 顯示當前搜尋 -->
    <div id="activeSearchInfo" class="active-search-info" style="display: none;">
        <span id="searchDescription"></span>
        <span id="searchCount"></span>
    </div>
    
    <!-- 系列篩選 -->
    <div class="filter-section">
        <div class="filter-row" id="seriesFilter">
            <button class="filter-btn active" data-type="series-all">全部系列</button>
            <button class="filter-btn" data-type="series-BX">BX系列</button>
            <button class="filter-btn" data-type="series-UX">UX系列</button>
            <button class="filter-btn" data-type="series-CX">CX系列</button>
        </div>
    </div>
    
    <!-- 零件篩選 -->
    <div class="part-filter-row" id="partFilter">
        <button class="part-filter-btn active" data-type="part-all">全部</button>
        <button class="part-filter-btn" data-type="part-blade">⚔️ Blade</button>
        <button class="part-filter-btn" data-type="part-ratchet">⚙️ Ratchet</button>
        <button class="part-filter-btn" data-type="part-bit">🔰 Bit</button>
    </div>
    
    <!-- 入手方式篩選 -->
    <div class="get-filter-container">
        <div class="get-filter-dropdown">
            <button class="get-filter-button" id="getFilterButton">
                <span id="selectedGetFilter">📦 全部入手方式</span>
                <span>▼</span>
            </button>
            <div class="get-filter-menu" id="getFilterMenu">
                <div class="get-filter-item active" data-get="all">📦 全部入手方式</div>
                <div class="get-filter-item" data-get="A">📱 A (App獲得)</div>
                <div class="get-filter-item" data-get="J">🇯🇵 J (日本限定)</div>
                <div class="get-filter-item" data-get="×3">📦 ×3 (一箱3個)</div>
                <div class="get-filter-item" data-get="×4">📦 ×4 (一箱4個)</div>
                <div class="get-filter-item" data-get="×5">📦 ×5 (一箱5個)</div>
                <div class="get-filter-item" data-get="×8">📦 ×8 (一箱8個)</div>
                <div class="get-filter-item" data-get="×12">📦 ×12 (一箱12個)</div>
            </div>
        </div>
    </div>
    
    <div id="stats" class="stats"></div>
    <div id="productList" class="product-list">
        <div class="loading-message">⏳ 載入數據中，請稍候...</div>
    </div>
    
    <div class="footer">
        <div>數據來源：GitHub (kitatamkt-prog/beyblade-data)</div>
        <div class="update-time" id="updateTime"></div>
    </div>

    <div id="detailModal" class="modal" onclick="if(event.target===this) hideDetail()">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ==================== 你嘅 GitHub 連結 ====================
        const DATA_URL = 'https://raw.githubusercontent.com/kitatamkt-prog/beyblade-data/refs/heads/main/beyblade_db.json';
        
        let products = [];
        let currentSeries = 'all';
        let currentPart = 'all';
        let currentGet = 'all';
        let searchTerm = '';
        let currentLang = 'zh';
        let activeSearchTag = ''; // 'blade', 'ratchet', 'bit'

        // 顯示更新時間
        document.getElementById('updateTime').innerHTML = `最後更新: ${new Date().toLocaleString('zh-HK')}`;

        // ==================== Dark Mode ====================
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            darkModeToggle.innerHTML = '☀️ 亮色模式';
        }
        
        darkModeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                darkModeToggle.innerHTML = '🌙 深色模式';
            } else {
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                darkModeToggle.innerHTML = '☀️ 亮色模式';
            }
        });

        // ==================== 語言切換 ====================
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                render();
            });
        });

        // ==================== 搜尋標籤功能 ====================
        document.querySelectorAll('.search-tag[data-search]').forEach(btn => {
            btn.addEventListener('click', () => {
                const searchType = btn.dataset.search;
                activeSearchTag = searchType;
                
                // 根據標籤設定搜尋詞
                if (searchType === 'blade') {
                    searchTerm = '';  // 留空，等用戶輸入
                    document.getElementById('searchInput').placeholder = '輸入 Blade 名稱 (如: 翔龍、Dran、ドラン)';
                } else if (searchType === 'ratchet') {
                    searchTerm = '';  // 留空，等用戶輸入
                    document.getElementById('searchInput').placeholder = '輸入 Ratchet 數字 (如: 6-60、5-70)';
                } else if (searchType === 'bit') {
                    searchTerm = '';  // 留空，等用戶輸入
                    document.getElementById('searchInput').placeholder = '輸入 Bit 代碼或名稱 (如: V、LO、Vortex)';
                }
                
                document.getElementById('searchInput').value = searchTerm;
                
                // 顯示清除按鈕
                document.getElementById('clearSearch').style.display = 'inline-flex';
                
                // 移除其他標籤的active狀態
                document.querySelectorAll('.search-tag[data-search]').forEach(tag => {
                    tag.classList.remove('active');
                });
                btn.classList.add('active');
                
                render();
            });
        });
        
        document.getElementById('clearSearch').addEventListener('click', () => {
            activeSearchTag = '';
            searchTerm = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInput').placeholder = '例如: 翔龍、6-60、V、LO、Slash...';
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('activeSearchInfo').style.display = 'none';
            document.querySelectorAll('.search-tag[data-search]').forEach(tag => {
                tag.classList.remove('active');
            });
            render();
        });

        // ==================== 入手方式下拉選單 ====================
        const getFilterButton = document.getElementById('getFilterButton');
        const getFilterMenu = document.getElementById('getFilterMenu');
        const selectedGetFilter = document.getElementById('selectedGetFilter');
        
        getFilterButton.addEventListener('click', (e) => {
            e.stopPropagation();
            getFilterMenu.classList.toggle('show');
        });
        
        document.addEventListener('click', () => {
            getFilterMenu.classList.remove('show');
        });
        
        document.querySelectorAll('.get-filter-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                
                document.querySelectorAll('.get-filter-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                currentGet = item.dataset.get;
                
                // 更新按鈕文字
                const itemText = item.innerText;
                selectedGetFilter.innerText = itemText;
                
                getFilterMenu.classList.remove('show');
                render();
            });
        });

        // ==================== 載入數據 ====================
        async function loadData() {
            const listEl = document.getElementById('productList');
            
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                products = Array.isArray(data) ? data : [];
                
                if (products.length === 0) throw new Error('無數據');
                
                // 為產品加入零件類型標記
                products = products.map(p => {
                    if (!p.part_type) {
                        // 根據數據判斷零件類型
                        if (p.type === 'CX' || p.main_blade_code) {
                            p.part_type = 'blade';
                        } else if (p.ratchet && p.ratchet !== '') {
                            p.part_type = 'ratchet';
                        } else if (p.bit_code) {
                            p.part_type = 'bit';
                        } else {
                            p.part_type = 'other';
                        }
                    }
                    return p;
                });
                
                updateStats();
                render();
                
            } catch (error) {
                console.error('載入失敗:', error);
                listEl.innerHTML = `
                    <div class="error-message">
                        <h3>📛 無法載入數據</h3>
                        <p>${error.message}</p>
                        <button class="retry-btn" onclick="loadData()">🔄 重試</button>
                    </div>
                `;
            }
        }

        // 更新統計
        function updateStats() {
            const total = products.length;
            const bx = products.filter(p => p.type === 'BX').length;
            const ux = products.filter(p => p.type === 'UX').length;
            const cx = products.filter(p => p.type === 'CX').length;
            
            // data-get 統計
            const getA = products.filter(p => p.data_get === 'A').length;
            const getJ = products.filter(p => p.data_get === 'J').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-item">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">總數</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${bx}</div>
                    <div class="stat-label">BX</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${ux}</div>
                    <div class="stat-label">UX</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${cx}</div>
                    <div class="stat-label">CX</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">A:${getA} J:${getJ}</div>
                    <div class="stat-label">App/日本</div>
                </div>
            `;
        }

        // 獲取 data-get 的樣式類別
        function getDataGetClass(dataGet) {
            if (!dataGet) return '';
            if (dataGet === 'A') return 'data-get-a';
            if (dataGet === 'J') return 'data-get-j';
            if (dataGet.match(/^×\d+$/)) return 'data-get-box';
            return '';
        }

        // 獲取 data-get 的顯示文字
        function getDataGetDisplay(dataGet) {
            if (!dataGet) return '';
            if (dataGet === 'A') return '📱 App';
            if (dataGet === 'J') return '🇯🇵 日本';
            if (dataGet === '×3') return '📦 3入';
            if (dataGet === '×4') return '📦 4入';
            if (dataGet === '×5') return '📦 5入';
            if (dataGet === '×8') return '📦 8入';
            if (dataGet === '×12') return '📦 12入';
            return dataGet;
        }

        // 獲取當前語言的名稱
        function getNameByLang(product, type = 'name') {
            if (type === 'name') {
                return product[`name_${currentLang}`] || product[`name_zh`] || '';
            } else if (type === 'assist') {
                return product[`assist_blade_${currentLang}`] || product[`assist_blade_zh`] || '';
            } else if (type === 'bit') {
                return product[`bit_name_${currentLang}`] || product[`bit_name_en`] || '';
            }
        }

        // 檢查產品是否符合搜尋條件 (增強版)
        function matchesSearch(product, term) {
            if (!term) return true;
            
            const termLower = term.toLowerCase();
            
            // 如果沒有指定搜尋標籤，搜尋所有欄位
            if (!activeSearchTag) {
                // Blade 相關欄位
                const bladeFields = [
                    product.name_zh, product.name_en, product.name_jp,
                    product.assist_blade_zh, product.assist_blade_en, product.assist_blade_jp,
                    product.main_blade_code, product.main_blade_eng, product.main_blade_jp
                ];
                
                // Ratchet 欄位
                const ratchetField = product.ratchet;
                
                // Bit 相關欄位
                const bitFields = [
                    product.bit_code,
                    product.bit_name_zh, product.bit_name_en, product.bit_name_jp
                ];
                
                // 型號
                const modelField = product.model;
                
                const allFields = [...bladeFields, ratchetField, ...bitFields, modelField];
                
                return allFields.some(field => 
                    field && field.toString().toLowerCase().includes(termLower)
                );
            }
            
            // 根據標籤指定搜尋範圍
            if (activeSearchTag === 'blade') {
                // 只搜尋 Blade 相關欄位
                const bladeFields = [
                    product.name_zh, product.name_en, product.name_jp,
                    product.assist_blade_zh, product.assist_blade_en, product.assist_blade_jp,
                    product.main_blade_code, product.main_blade_eng, product.main_blade_jp
                ];
                return bladeFields.some(field => 
                    field && field.toString().toLowerCase().includes(termLower)
                );
            }
            
            if (activeSearchTag === 'ratchet') {
                // 只搜尋 Ratchet 欄位
                return product.ratchet && product.ratchet.toLowerCase().includes(termLower);
            }
            
            if (activeSearchTag === 'bit') {
                // 只搜尋 Bit 相關欄位
                const bitFields = [
                    product.bit_code,
                    product.bit_name_zh, product.bit_name_en, product.bit_name_jp
                ];
                return bitFields.some(field => 
                    field && field.toString().toLowerCase().includes(termLower)
                );
            }
            
            return false;
        }

        // 過濾產品
        function getFilteredProducts() {
            return products.filter(p => {
                // 系列篩選
                if (currentSeries !== 'all' && p.type !== currentSeries) return false;
                
                // 零件篩選
                if (currentPart !== 'all' && p.part_type !== currentPart) return false;
                
                // data-get 篩選
                if (currentGet !== 'all') {
                    if (currentGet === 'A' && p.data_get !== 'A') return false;
                    if (currentGet === 'J' && p.data_get !== 'J') return false;
                    if (currentGet === '×3' && p.data_get !== '×3') return false;
                    if (currentGet === '×4' && p.data_get !== '×4') return false;
                    if (currentGet === '×5' && p.data_get !== '×5') return false;
                    if (currentGet === '×8' && p.data_get !== '×8') return false;
                    if (currentGet === '×12' && p.data_get !== '×12') return false;
                }
                
                // 搜尋篩選
                return matchesSearch(p, searchTerm);
            });
        }

        // 渲染產品列表
        function render() {
            const filtered = getFilteredProducts();
            const listEl = document.getElementById('productList');
            
            // 更新搜尋資訊
            if (searchTerm) {
                let searchDesc = '';
                if (activeSearchTag === 'blade') searchDesc = `⚔️ 搜尋 Blade: "${searchTerm}"`;
                else if (activeSearchTag === 'ratchet') searchDesc = `⚙️ 搜尋 Ratchet: "${searchTerm}"`;
                else if (activeSearchTag === 'bit') searchDesc = `🔰 搜尋 Bit: "${searchTerm}"`;
                else searchDesc = `🔍 搜尋: "${searchTerm}"`;
                
                document.getElementById('searchDescription').innerHTML = searchDesc;
                document.getElementById('searchCount').innerHTML = `📊 ${filtered.length} 項`;
                document.getElementById('activeSearchInfo').style.display = 'flex';
            } else {
                document.getElementById('activeSearchInfo').style.display = 'none';
            }
            
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="loading-message">🔍 沒有符合的產品</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(p => {
                const mainName = getNameByLang(p, 'name');
                const assistName = getNameByLang(p, 'assist');
                const bitName = getNameByLang(p, 'bit');
                
                let nameHtml = mainName;
                if (p.type === 'CX' && assistName) {
                    nameHtml = `${mainName} + ${assistName}`;
                }
                
                // 顯示其他語言版本（細字）
                let altNames = '';
                if (currentLang === 'zh') {
                    altNames = p.name_en ? `🇬🇧 ${p.name_en}` : '';
                } else if (currentLang === 'en') {
                    altNames = p.name_zh ? `🇨🇳 ${p.name_zh}` : '';
                } else {
                    altNames = p.name_en ? `🇬🇧 ${p.name_en}` : '';
                }
                
                // data-get 徽章
                const dataGetClass = getDataGetClass(p.data_get);
                const dataGetDisplay = getDataGetDisplay(p.data_get);
                const dataGetBadge = p.data_get ? 
                    `<span class="data-get-badge ${dataGetClass}">${dataGetDisplay}</span>` : '';
                
                html += `
                    <div class="product-card ${p.type}" onclick="showDetail('${p.model}', '${p.type}')">
                        <div class="product-model">
                            <span>${p.model} ${dataGetBadge}</span>
                            <span class="product-type">${p.type}</span>
                        </div>
                        <div class="product-name">${nameHtml}</div>
                        ${altNames ? `<div class="product-name-small">${altNames}</div>` : ''}
                        <div class="product-specs">
                            ${p.ratchet ? `<span>⚙️ ${p.ratchet}</span>` : ''}
                            ${p.bit_code ? `<span>🔰 ${p.bit_code}</span>` : ''}
                            ${bitName ? `<span>${bitName}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            
            listEl.innerHTML = html;
        }

        // 顯示詳細資料
        function showDetail(model, type) {
            const product = products.find(p => p.model === model && p.type === type);
            if (!product) return;
            
            // data-get 詳細顯示
            let dataGetHtml = '';
            if (product.data_get) {
                const dataGetClass = getDataGetClass(product.data_get);
                const dataGetDisplay = getDataGetDisplay(product.data_get);
                dataGetHtml = `
                    <div class="detail-section">
                        <div class="detail-title">📦 入手方式</div>
                        <div class="data-get-info ${dataGetClass}">${dataGetDisplay}</div>
                        ${product.data_get === 'A' ? '<div style="margin-top:8px;">🔹 App 限定獲得</div>' : ''}
                        ${product.data_get === 'J' ? '<div style="margin-top:8px;">🔹 日本國內限定發售</div>' : ''}
                        ${product.data_get && product.data_get.match(/^×\d+$/) ? 
                            `<div style="margin-top:8px;">🔹 一箱 ${product.data_get.replace('×','')} 個</div>` : ''}
                    </div>
                `;
            }
            
            let content = `
                <span class="close-btn" onclick="hideDetail()">&times;</span>
                <h2 style="margin-top:0;">${product.model}</h2>
                <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
                    <span style="background:var(--badge-bg); padding:4px 12px; border-radius:20px;">${product.type} 系列</span>
                    <span style="background:var(--badge-bg); padding:4px 12px; border-radius:20px;">零件: ${product.part_type}</span>
                </div>
            `;
            
            // 三語名稱顯示
            content += `
                <div class="detail-section">
                    <div class="detail-title">📝 名稱</div>
                    <div style="margin:10px 0;">
                        <span class="lang-tag">🇨🇳 中文</span> ${product.name_zh || '—'}<br>
                        <span class="lang-tag">🇬🇧 英文</span> ${product.name_en || '—'}<br>
                        <span class="lang-tag">🇯🇵 日文</span> ${product.name_jp || '—'}
                    </div>
                </div>
            `;
            
            // CX 系列 Blade 組合
            if (product.type === 'CX') {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">⚔️ Blade 組合</div>
                        <div class="blade-row">
                            <div class="blade-main">
                                <div class="blade-label">Main Blade</div>
                                <div class="blade-name">${product.main_blade_code || ''} ${product.main_blade_eng || ''}</div>
                                <div style="font-size:0.9rem; margin-top:4px;">
                                    <div>🇨🇳 ${product.name_zh || '—'}</div>
                                    <div>🇬🇧 ${product.name_en || '—'}</div>
                                    <div>🇯🇵 ${product.name_jp || '—'}</div>
                                </div>
                            </div>
                            <div class="blade-assist">
                                <div class="blade-label">Assist Blade</div>
                                <div class="blade-name">${product.assist_blade_en || ''}</div>
                                <div style="font-size:0.9rem; margin-top:4px;">
                                    <div>🇨🇳 ${product.assist_blade_zh || '—'}</div>
                                    <div>🇬🇧 ${product.assist_blade_en || '—'}</div>
                                    <div>🇯🇵 ${product.assist_blade_jp || '—'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Ratchet 資訊
            if (product.ratchet) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">⚙️ Ratchet</div>
                        <div style="font-size:1.2rem;">${product.ratchet}</div>
                    </div>
                `;
            }
            
            // Bit 資訊
            if (product.bit_code) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">🔰 Bit</div>
                        <div style="font-size:1.2rem; margin-bottom:8px;">${product.bit_code}</div>
                        <div>
                            <span class="lang-tag">🇨🇳</span> ${product.bit_name_zh || '—'}<br>
                            <span class="lang-tag">🇬🇧</span> ${product.bit_name_en || '—'}<br>
                            <span class="lang-tag">🇯🇵</span> ${product.bit_name_jp || '—'}
                        </div>
                    </div>
                `;
            }
            
            // 加入 data-get 資訊
            content += dataGetHtml;
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('detailModal').classList.add('show');
        }

        function hideDetail() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // ==================== 事件監聽 ====================
        document.addEventListener('DOMContentLoaded', loadData);

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            
            // 如果手動輸入，清除標籤狀態
            if (searchTerm) {
                activeSearchTag = '';
                document.querySelectorAll('.search-tag[data-search]').forEach(tag => {
                    tag.classList.remove('active');
                });
                document.getElementById('clearSearch').style.display = 'inline-flex';
                document.getElementById('searchInput').placeholder = '例如: 翔龍、6-60、V、LO、Slash...';
            } else {
                document.getElementById('clearSearch').style.display = 'none';
                document.getElementById('activeSearchInfo').style.display = 'none';
            }
            
            render();
        });

        document.querySelectorAll('#seriesFilter .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#seriesFilter .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSeries = btn.dataset.type.replace('series-', '');
                render();
            });
        });

        document.querySelectorAll('#partFilter .part-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#partFilter .part-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPart = btn.dataset.type.replace('part-', '');
                render();
            });
        });
    </script>
</body>
</html>
