<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Beyblade X 完整查詢系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.2s, border-color 0.2s;
        }
        
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #555;
            --text-muted: #888;
            --border-color: #ddd;
            --header-bg: #1e2b3c;
            --header-text: white;
            --card-bg: white;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.05);
            --modal-bg: white;
            --badge-bg: #eef2f5;
            --bx-color: #4a6fa5;
            --ux-color: #b05b5b;
            --cx-color: #5b8c5b;
            --filter-btn-bg: white;
            --filter-btn-text: #1e2b3c;
            --filter-btn-border: #ddd;
            --filter-btn-active-bg: #1e2b3c;
            --filter-btn-active-text: white;
            --stats-bg: white;
            --close-btn-bg: #f0f0f0;
            --get-a-bg: #ffd700;
            --get-a-text: #1e2b3c;
            --get-j-bg: #ff6b6b;
            --get-j-text: white;
            --get-box-bg: #4caf50;
            --get-box-text: white;
            --get-t-bg: #9c27b0;
            --get-t-text: white;
            --sort-btn-bg: #e0e0e0;
            --sort-btn-text: #1e2b3c;
            --sort-btn-active: #1e2b3c;
            --sort-btn-active-text: white;
        }
        
        body.dark-mode {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-color: #333;
            --header-bg: #0a0a0a;
            --header-text: #e0e0e0;
            --card-bg: #2d2d2d;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
            --modal-bg: #2d2d2d;
            --badge-bg: #404040;
            --bx-color: #5a8fc9;
            --ux-color: #d47c7c;
            --cx-color: #7cae7c;
            --filter-btn-bg: #2d2d2d;
            --filter-btn-text: #e0e0e0;
            --filter-btn-border: #444;
            --filter-btn-active-bg: #4a6fa5;
            --filter-btn-active-text: white;
            --stats-bg: #2d2d2d;
            --close-btn-bg: #404040;
            --get-a-bg: #b8860b;
            --get-a-text: white;
            --get-j-bg: #8b0000;
            --get-j-text: white;
            --get-box-bg: #2e7d32;
            --get-box-text: white;
            --get-t-bg: #6a1b9a;
            --get-t-text: white;
            --sort-btn-bg: #404040;
            --sort-btn-text: #e0e0e0;
            --sort-btn-active: #4a6fa5;
            --sort-btn-active-text: white;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .header h1 span {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        .dark-mode-toggle {
            background: var(--filter-btn-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .lang-bar {
            display: flex;
            gap: 8px;
            margin: 12px 16px;
            flex-wrap: wrap;
        }
        
        .lang-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            min-width: 70px;
        }
        
        .lang-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        .search-box {
            background: var(--bg-secondary);
            margin: 0 16px 16px;
            padding: 12px 16px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            display: flex;
            border: 1px solid var(--border-color);
        }
        
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            background: transparent;
            color: var(--text-primary);
        }
        
        .filter-section {
            margin: 0 16px 16px;
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        
        .filter-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        /* 零件篩選行 */
        .part-filter-row {
            display: flex;
            gap: 8px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .part-filter-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 24px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            min-width: 100px;
            text-align: center;
        }
        
        .part-filter-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        /* 排序按鈕 */
        .sort-section {
            display: flex;
            justify-content: flex-end;
            margin: 0 16px 16px;
            gap: 8px;
        }
        
        .sort-btn {
            background: var(--sort-btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--sort-btn-text);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .sort-btn.active {
            background: var(--sort-btn-active);
            color: var(--sort-btn-active-text);
            border-color: var(--sort-btn-active);
        }
        
        .stats {
            background: var(--stats-bg);
            margin: 0 16px 16px;
            padding: 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            min-width: 70px;
        }
        
        .stat-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .product-list {
            margin: 0 16px 20px;
        }
        
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            border-left-width: 4px;
        }
        
        .product-card.BX { border-left-color: var(--bx-color); }
        .product-card.UX { border-left-color: var(--ux-color); }
        .product-card.CX { border-left-color: var(--cx-color); }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .product-model {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .product-type {
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 8px;
            border-radius: 12px;
            color: var(--text-primary);
        }
        
        .product-name {
            font-size: 1rem;
            color: var(--text-secondary);
            margin: 4px 0;
        }
        
        .product-assist-code {
            display: inline-block;
            background: var(--badge-bg);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-right: 8px;
        }
        
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }
        
        .product-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--badge-bg);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .product-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 8px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .product-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
        
        .data-get-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .data-get-a {
            background: var(--get-a-bg);
            color: var(--get-a-text);
        }
        
        .data-get-j {
            background: var(--get-j-bg);
            color: var(--get-j-text);
        }
        
        .data-get-t {
            background: var(--get-t-bg);
            color: var(--get-t-text);
        }
        
        .data-get-box {
            background: var(--get-box-bg);
            color: var(--get-box-text);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
            align-items: flex-end;
        }
        
        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.2s;
            color: var(--text-primary);
            border-top: 1px solid var(--border-color);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .close-btn {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            text-align: center;
            line-height: 36px;
            border-radius: 50%;
            background: var(--close-btn-bg);
            color: var(--text-primary);
        }
        
        .detail-section {
            margin: 20px 0;
        }
        
        .detail-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        
        .lang-tag {
            display: inline-block;
            background: var(--badge-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 4px;
        }
        
        .data-get-info {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .loading-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 10px 16px 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ Beyblade X 完整查詢 <span id="dataCount">0</span></h1>
        <button class="dark-mode-toggle" id="darkModeToggle">🌙 深色模式</button>
    </div>
    
    <!-- 語言切換 -->
    <div class="lang-bar" id="langFilter">
        <button class="lang-btn active" data-lang="zh_hk">🇭🇰 港</button>
        <button class="lang-btn" data-lang="zh_tw">🇨🇳 台</button>
        <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        <button class="lang-btn" data-lang="jp">🇯🇵 JP</button>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋型號、名稱...">
    </div>
    
    <!-- 零件篩選 -->
    <div class="part-filter-row" id="partFilter">
        <button class="part-filter-btn active" data-type="all">全部零件</button>
        <button class="part-filter-btn" data-type="blade">⚔️ Blade</button>
        <button class="part-filter-btn" data-type="ratchet">⚙️ Ratchet</button>
        <button class="part-filter-btn" data-type="bit">🔰 Bit</button>
    </div>
    
    <!-- 篩選按鈕 -->
    <div class="filter-section">
        <div class="filter-row" id="seriesFilter">
            <button class="filter-btn active" data-type="all">全部系列</button>
            <button class="filter-btn" data-type="BX">BX系列</button>
            <button class="filter-btn" data-type="UX">UX系列</button>
            <button class="filter-btn" data-type="CX">CX系列</button>
        </div>
        <div class="filter-row" id="getFilter">
            <button class="filter-btn active" data-type="all">全部入手</button>
            <button class="filter-btn" data-type="A">📱 App</button>
            <button class="filter-btn" data-type="J">🇯🇵 日本</button>
            <button class="filter-btn" data-type="T">📦 通販</button>
            <button class="filter-btn" data-type="box">🎲 抽包</button>
        </div>
    </div>
    
    <!-- 排序功能 -->
    <div class="sort-section">
        <button class="sort-btn active" id="sortSeries">🔤 系列優先 (BX→UX→CX)</button>
        <button class="sort-btn" id="sortModel">📇 型號排序</button>
    </div>
    
    <div id="stats" class="stats"></div>
    <div id="productList" class="product-list">
        <div class="loading-message">⏳ 載入數據中...</div>
    </div>
    
    <div class="footer">
        <div id="updateTime"></div>
    </div>
    
    <div id="detailModal" class="modal" onclick="if(event.target===this) hideDetail()">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // 直接用同一個 domain 嘅 JSON
        const DATA_URL = 'beyblade_db.json';
        
        let products = [];
        let currentSeries = 'all';
        let currentPart = 'all';
        let currentGet = 'all';
        let searchTerm = '';
        let currentLang = 'zh_hk';
        let sortMode = 'series'; // 'series' 或 'model'

        // ==================== Dark Mode ====================
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            darkModeToggle.innerHTML = '☀️ 亮色模式';
        }
        
        darkModeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
                darkModeToggle.innerHTML = '🌙 深色模式';
            } else {
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
                darkModeToggle.innerHTML = '☀️ 亮色模式';
            }
        });

        // ==================== 排序切換 ====================
        document.getElementById('sortSeries').addEventListener('click', () => {
            document.getElementById('sortSeries').classList.add('active');
            document.getElementById('sortModel').classList.remove('active');
            sortMode = 'series';
            render();
        });
        
        document.getElementById('sortModel').addEventListener('click', () => {
            document.getElementById('sortModel').classList.add('active');
            document.getElementById('sortSeries').classList.remove('active');
            sortMode = 'model';
            render();
        });

        // ==================== 載入數據 ====================
        async function loadData() {
            const listEl = document.getElementById('productList');
            const dataCountEl = document.getElementById('dataCount');
            const updateTimeEl = document.getElementById('updateTime');
            
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                products = Array.isArray(data) ? data : [];
                
                // 為每個產品加入零件類型標記
                products = products.map(p => {
                    if (!p.part_type) {
                        // 根據數據判斷零件類型
                        if (p.type === 'CX') {
                            p.part_type = 'blade';
                        } else if (p.ratchet && p.ratchet !== '') {
                            p.part_type = 'ratchet';
                        } else if (p.bit_code) {
                            p.part_type = 'bit';
                        } else {
                            p.part_type = 'blade'; // 預設為 blade
                        }
                    }
                    return p;
                });
                
                dataCountEl.textContent = products.length;
                updateTimeEl.innerHTML = `最後更新: ${new Date().toLocaleString('zh-HK')} (共 ${products.length} 項)`;
                
                updateStats();
                render();
                
            } catch (error) {
                listEl.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#cc0000;">
                        <h3>📛 無法載入數據</h3>
                        <p>${error.message}</p>
                        <p>請確保 <code>beyblade_db.json</code> 同 HTML 放埋一齊</p>
                        <button class="filter-btn" style="margin-top:20px;" onclick="location.reload()">🔄 重試</button>
                    </div>
                `;
            }
        }

        // ==================== 更新統計 ====================
        function updateStats() {
            const total = products.length;
            const bx = products.filter(p => p.type === 'BX').length;
            const ux = products.filter(p => p.type === 'UX').length;
            const cx = products.filter(p => p.type === 'CX').length;
            
            const blade = products.filter(p => p.part_type === 'blade').length;
            const ratchet = products.filter(p => p.part_type === 'ratchet').length;
            const bit = products.filter(p => p.part_type === 'bit').length;
            
            const getA = products.filter(p => p.data_get === 'A').length;
            const getJ = products.filter(p => p.data_get === 'J').length;
            const getT = products.filter(p => !p.data_get || p.data_get === '').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-item">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">總數</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${bx}</div>
                    <div class="stat-label">BX</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${ux}</div>
                    <div class="stat-label">UX</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${cx}</div>
                    <div class="stat-label">CX</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">⚔️${blade} ⚙️${ratchet} 🔰${bit}</div>
                    <div class="stat-label">零件</div>
                </div>
            `;
        }

        // ==================== 輔助函數 ====================
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getNameByLang(product, field) {
            if (field === 'chip') {
                return product[`chip_${currentLang}`] || product.chip_zh_hk || product.chip_en || '';
            }
            if (field === 'main') {
                return product[`main_blade_${currentLang}`] || product.main_blade_zh_hk || '';
            }
            if (field === 'metal') {
                return product[`metal_${currentLang}`] || product.metal_zh_hk || '';
            }
            if (field === 'over') {
                return product[`over_${currentLang}`] || product.over_zh_hk || '';
            }
            if (field === 'assist') {
                return product[`assist_blade_${currentLang}`] || product.assist_blade_zh_hk || '';
            }
            if (field === 'bit') {
                return product[`bit_name_${currentLang}`] || product.bit_name_zh_hk || product.bit_name_en || '';
            }
            return '';
        }

        function getDataGetClass(dataGet) {
            if (!dataGet || dataGet === '') return 'data-get-t';
            if (dataGet === 'A') return 'data-get-a';
            if (dataGet === 'J') return 'data-get-j';
            if (dataGet.match(/^×\d+$/)) return 'data-get-box';
            return 'data-get-t';
        }

        function getDataGetDisplay(dataGet) {
            if (!dataGet || dataGet === '') return '📦 通販';
            if (dataGet === 'A') return '📱 App';
            if (dataGet === 'J') return '🇯🇵 日本';
            if (dataGet === '×3') return '🎲 3入';
            if (dataGet === '×4') return '🎲 4入';
            if (dataGet === '×5') return '🎲 5入';
            if (dataGet === '×8') return '🎲 8入';
            if (dataGet === '×12') return '🎲 12入';
            return '📦 通販';
        }

        // ==================== 過濾產品 ====================
        function getFilteredProducts() {
            return products.filter(p => {
                // 系列篩選
                if (currentSeries !== 'all' && p.type !== currentSeries) return false;
                
                // 零件篩選
                if (currentPart !== 'all' && p.part_type !== currentPart) return false;
                
                // 入手方式篩選
                if (currentGet !== 'all') {
                    if (currentGet === 'A' && p.data_get !== 'A') return false;
                    if (currentGet === 'J' && p.data_get !== 'J') return false;
                    if (currentGet === 'T' && p.data_get && p.data_get !== '') return false;
                    if (currentGet === 'box' && (!p.data_get || !p.data_get.match(/^×\d+$/))) return false;
                }
                
                // 搜尋篩選
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    return (p.model && p.model.toLowerCase().includes(term)) ||
                           (p.main_blade_zh_hk && p.main_blade_zh_hk.toLowerCase().includes(term)) ||
                           (p.main_blade_en && p.main_blade_en.toLowerCase().includes(term)) ||
                           (p.chip_zh_hk && p.chip_zh_hk.toLowerCase().includes(term)) ||
                           (p.assist_blade_code && p.assist_blade_code.toLowerCase().includes(term));
                }
                return true;
            });
        }

        // ==================== 排序產品 ====================
        function sortProducts(productsToSort) {
            const sorted = [...productsToSort];
            
            if (sortMode === 'series') {
                // 系列優先：BX > UX > CX，同系列內按 model 排序
                const seriesOrder = { 'BX': 1, 'UX': 2, 'CX': 3 };
                sorted.sort((a, b) => {
                    // 先按系列排序
                    const seriesDiff = (seriesOrder[a.type] || 999) - (seriesOrder[b.type] || 999);
                    if (seriesDiff !== 0) return seriesDiff;
                    
                    // 同系列按 model 排序
                    return a.model.localeCompare(b.model);
                });
            } else {
                // 純 model 排序
                sorted.sort((a, b) => a.model.localeCompare(b.model));
            }
            
            return sorted;
        }

        // ==================== 渲染 ====================
        function render() {
            let filtered = getFilteredProducts();
            filtered = sortProducts(filtered);
            
            const listEl = document.getElementById('productList');
            
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="loading-message">🔍 沒有符合的產品</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(p => {
                const chipName = escapeHTML(getNameByLang(p, 'chip'));
                const mainName = escapeHTML(getNameByLang(p, 'main'));
                const metalName = escapeHTML(getNameByLang(p, 'metal'));
                const overName = escapeHTML(getNameByLang(p, 'over'));
                const assistName = escapeHTML(getNameByLang(p, 'assist'));
                const assistCode = p.assist_blade_code ? escapeHTML(p.assist_blade_code) : '';
                const bitName = escapeHTML(getNameByLang(p, 'bit'));
                
                // CX系列：chip · metal · over · assist
                // 其他系列：main only (用 chip_zh_hk 同 main_blade)
                let nameHtml = '';
                let tags = '';
                let assistCodeHtml = '';
                
                if (p.type === 'CX') {
                    const parts = [];
                    if (chipName) parts.push(chipName);
                    if (metalName) parts.push(metalName);
                    if (overName) parts.push(overName);
                    if (assistName) parts.push(assistName);
                    nameHtml = parts.join(' · ');
                    
                    // 顯示 Assist Blade code
                    if (assistCode) {
                        assistCodeHtml = `<span class="product-assist-code">🔪 ${assistCode}</span>`;
                    }
                    
                    // 顯示 Metal 同 Over 標籤
                    if (metalName) {
                        tags += `<span class="product-tag">⚙️ ${metalName}</span>`;
                    }
                    if (overName) {
                        tags += `<span class="product-tag">⬆️ ${overName}</span>`;
                    }
                } else {
                    // 其他系列用 main blade 做名稱
                    nameHtml = mainName;
                }
                
                const dataGetClass = getDataGetClass(p.data_get);
                const dataGetDisplay = getDataGetDisplay(p.data_get);
                
                html += `
                    <div class="product-card ${escapeHTML(p.type)}" onclick="showDetail('${escapeHTML(p.model)}')">
                        <div class="product-header">
                            <span class="product-model">${escapeHTML(p.model)} ${assistCodeHtml}</span>
                            <span class="product-type">${escapeHTML(p.type)}</span>
                        </div>
                        <div class="product-name">${nameHtml}</div>
                        ${tags ? `<div class="product-tags">${tags}</div>` : ''}
                        <div class="product-specs">
                            ${p.ratchet ? `<span>⚙️ ${escapeHTML(p.ratchet)}</span>` : ''}
                            ${p.bit_code ? `<span>🔰 ${escapeHTML(p.bit_code)}</span>` : ''}
                            ${bitName ? `<span>${bitName}</span>` : ''}
                        </div>
                        <div class="product-footer">
                            <span class="data-get-badge ${dataGetClass}">${escapeHTML(dataGetDisplay)}</span>
                        </div>
                    </div>
                `;
            });
            
            listEl.innerHTML = html;
        }

        // ==================== 詳細頁 ====================
        window.showDetail = function(model) {
            const product = products.find(p => p.model === model);
            if (!product) return;
            
            const dataGetClass = getDataGetClass(product.data_get);
            const dataGetDisplay = getDataGetDisplay(product.data_get);
            
            let content = `
                <span class="close-btn" onclick="hideDetail()">&times;</span>
                <h2 style="margin-top:0;">${escapeHTML(product.model)}</h2>
                <div style="display:flex; gap:8px; margin-bottom:16px;">
                    <span style="background:var(--badge-bg); padding:4px 12px; border-radius:20px;">${escapeHTML(product.type)} 系列</span>
                    <span style="background:var(--badge-bg); padding:4px 12px; border-radius:20px;">零件: ${escapeHTML(product.part_type)}</span>
                </div>
            `;
            
            // 本體名稱 (CX系列)
            if (product.type === 'CX' && product.chip_zh_hk) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">📝 本體名稱 (Chip)</div>
                        <div><span class="lang-tag">🇭🇰 港</span> ${escapeHTML(product.chip_zh_hk) || '—'}</div>
                        <div><span class="lang-tag">🇨🇳 台</span> ${escapeHTML(product.chip_zh_tw) || '—'}</div>
                        <div><span class="lang-tag">🇬🇧 英</span> ${escapeHTML(product.chip_en) || '—'}</div>
                        <div><span class="lang-tag">🇯🇵 日</span> ${escapeHTML(product.chip_jp) || '—'}</div>
                    </div>
                `;
            }
            
            // Metal (CX系列)
            if (product.metal_zh_hk) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">⚙️ Metal</div>
                        <div><span class="lang-tag">🇭🇰 港</span> ${escapeHTML(product.metal_zh_hk) || '—'}</div>
                        <div><span class="lang-tag">🇨🇳 台</span> ${escapeHTML(product.metal_zh_tw) || '—'}</div>
                        <div><span class="lang-tag">🇬🇧 英</span> ${escapeHTML(product.metal_en) || '—'}</div>
                        <div><span class="lang-tag">🇯🇵 日</span> ${escapeHTML(product.metal_jp) || '—'}</div>
                    </div>
                `;
            }
            
            // Over (CX系列)
            if (product.over_zh_hk) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">⬆️ Over</div>
                        <div><span class="lang-tag">🇭🇰 港</span> ${escapeHTML(product.over_zh_hk) || '—'}</div>
                        <div><span class="lang-tag">🇨🇳 台</span> ${escapeHTML(product.over_zh_tw) || '—'}</div>
                        <div><span class="lang-tag">🇬🇧 英</span> ${escapeHTML(product.over_en) || '—'}</div>
                        <div><span class="lang-tag">🇯🇵 日</span> ${escapeHTML(product.over_jp) || '—'}</div>
                    </div>
                `;
            }
            
            // 主 blade (所有系列)
            if (product.main_blade_zh_hk) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">⚔️ 主 blade</div>
                        <div><span class="lang-tag">🇭🇰 港</span> ${escapeHTML(product.main_blade_zh_hk) || '—'}</div>
                        <div><span class="lang-tag">🇨🇳 台</span> ${escapeHTML(product.main_blade_zh_tw) || '—'}</div>
                        <div><span class="lang-tag">🇬🇧 英</span> ${escapeHTML(product.main_blade_en) || '—'}</div>
                        <div><span class="lang-tag">🇯🇵 日</span> ${escapeHTML(product.main_blade_jp) || '—'}</div>
                    </div>
                `;
            }
            
            // 輔助刀 (CX系列)
            if (product.assist_blade_zh_hk) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">🔪 輔助刀 (Assist Blade)</div>
                        <div><strong>代碼:</strong> ${escapeHTML(product.assist_blade_code) || '—'}</div>
                        <div><span class="lang-tag">🇭🇰 港</span> ${escapeHTML(product.assist_blade_zh_hk) || '—'}</div>
                        <div><span class="lang-tag">🇨🇳 台</span> ${escapeHTML(product.assist_blade_zh_tw) || '—'}</div>
                        <div><span class="lang-tag">🇬🇧 英</span> ${escapeHTML(product.assist_blade_en) || '—'}</div>
                        <div><span class="lang-tag">🇯🇵 日</span> ${escapeHTML(product.assist_blade_jp) || '—'}</div>
                    </div>
                `;
            }
            
            // Ratchet
            if (product.ratchet) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">⚙️ Ratchet</div>
                        <div style="font-size:1.2rem;">${escapeHTML(product.ratchet)}</div>
                    </div>
                `;
            }
            
            // Bit
            if (product.bit_code) {
                content += `
                    <div class="detail-section">
                        <div class="detail-title">🔰 Bit</div>
                        <div><strong>代碼:</strong> ${escapeHTML(product.bit_code)}</div>
                        <div><span class="lang-tag">🇭🇰 港</span> ${escapeHTML(product.bit_name_zh_hk) || '—'}</div>
                        <div><span class="lang-tag">🇨🇳 台</span> ${escapeHTML(product.bit_name_zh_tw) || '—'}</div>
                        <div><span class="lang-tag">🇬🇧 英</span> ${escapeHTML(product.bit_name_en) || '—'}</div>
                        <div><span class="lang-tag">🇯🇵 日</span> ${escapeHTML(product.bit_name_jp) || '—'}</div>
                    </div>
                `;
            }
            
            // 入手方式
            content += `
                <div class="detail-section">
                    <div class="detail-title">📦 入手方式</div>
                    <div class="data-get-info ${dataGetClass}">${escapeHTML(dataGetDisplay)}</div>
                </div>
            `;
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('detailModal').classList.add('show');
        };

        window.hideDetail = function() {
            document.getElementById('detailModal').classList.remove('show');
        };

        // ==================== 事件監聽 ====================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            render();
        });

        document.querySelectorAll('#langFilter .lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#langFilter .lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                render();
            });
        });

        // 零件篩選事件
        document.querySelectorAll('#partFilter .part-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#partFilter .part-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPart = btn.dataset.type;
                render();
            });
        });

        document.querySelectorAll('#seriesFilter .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#seriesFilter .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSeries = btn.dataset.type;
                render();
            });
        });

        document.querySelectorAll('#getFilter .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#getFilter .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentGet = btn.dataset.type;
                render();
            });
        });

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
