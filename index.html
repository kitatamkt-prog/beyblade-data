<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Beyblade X 完整查詢系統</title>
    <style>
        /* ===== 現有樣式 (保留之前所有樣式) ===== */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.2s, border-color 0.2s;
        }
        
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1e2b3c;
            --text-secondary: #555;
            --text-muted: #888;
            --border-color: #ddd;
            --header-bg: #1e2b3c;
            --header-text: white;
            --card-bg: white;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.05);
            --modal-bg: white;
            --badge-bg: #eef2f5;
            --bx-color: #4a6fa5;
            --ux-color: #b05b5b;
            --cx-color: #5b8c5b;
            --filter-btn-bg: white;
            --filter-btn-text: #1e2b3c;
            --filter-btn-border: #ddd;
            --filter-btn-active-bg: #1e2b3c;
            --filter-btn-active-text: white;
            --stats-bg: white;
            --close-btn-bg: #f0f0f0;
            --get-a-bg: #ffd700;
            --get-a-text: #1e2b3c;
            --get-j-bg: #ff6b6b;
            --get-j-text: white;
            --get-box-bg: #4caf50;
            --get-box-text: white;
            --get-t-bg: #9c27b0;
            --get-t-text: white;
            --dropdown-bg: white;
            --dropdown-border: #ddd;
            --dropdown-hover: #eef2f5;
            --favorite-color: #ffb347;
            --wishlist-color: #4a90e2;
        }
        
        body.dark-mode {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-color: #333;
            --header-bg: #0a0a0a;
            --header-text: #e0e0e0;
            --card-bg: #2d2d2d;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
            --modal-bg: #2d2d2d;
            --badge-bg: #404040;
            --bx-color: #5a8fc9;
            --ux-color: #d47c7c;
            --cx-color: #7cae7c;
            --filter-btn-bg: #2d2d2d;
            --filter-btn-text: #e0e0e0;
            --filter-btn-border: #444;
            --filter-btn-active-bg: #4a6fa5;
            --filter-btn-active-text: white;
            --stats-bg: #2d2d2d;
            --close-btn-bg: #404040;
            --get-a-bg: #b8860b;
            --get-a-text: white;
            --get-j-bg: #8b0000;
            --get-j-text: white;
            --get-box-bg: #2e7d32;
            --get-box-text: white;
            --get-t-bg: #6a1b9a;
            --get-t-text: white;
            --dropdown-bg: #2d2d2d;
            --dropdown-border: #444;
            --dropdown-hover: #404040;
            --favorite-color: #ffa500;
            --wishlist-color: #6a8cff;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        /* ===== Header ===== */
        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .header-left h1 {
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-left h1 span {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        /* ===== 語言下拉選單 ===== */
        .lang-dropdown {
            position: relative;
            display: inline-block;
            min-width: 90px;
        }
        
        .lang-button {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            width: 100%;
        }
        
        .lang-button:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .lang-menu {
            display: none;
            position: absolute;
            top: 45px;
            right: 0;
            background: var(--dropdown-bg);
            border: 1px solid var(--dropdown-border);
            border-radius: 16px;
            padding: 8px;
            z-index: 20;
            min-width: 120px;
            box-shadow: var(--card-shadow);
        }
        
        .lang-menu.show {
            display: block;
        }
        
        .lang-item {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 30px;
            margin: 4px 0;
            color: var(--text-primary);
        }
        
        .lang-item:hover {
            background: var(--dropdown-hover);
        }
        
        .lang-item.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
        }
        
        .dark-mode-toggle {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .dark-mode-toggle:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* ===== 功能按鈕欄 ===== */
        .action-bar {
            display: flex;
            gap: 8px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .action-btn:hover {
            background: var(--badge-bg);
        }
        
        .action-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
        }
        
        .action-btn.favorite {
            background: var(--favorite-color);
            color: #1e2b3c;
            border-color: var(--favorite-color);
        }
        
        .action-btn.wishlist {
            background: var(--wishlist-color);
            color: white;
            border-color: var(--wishlist-color);
        }
        
        .action-btn.export {
            background: var(--filter-btn-bg);
            border-color: var(--filter-btn-border);
        }
        
        /* ===== 零件收集清單 ===== */
        .wishlist-panel {
            background: var(--card-bg);
            border: 2px solid var(--wishlist-color);
            border-radius: 20px;
            margin: 0 16px 16px;
            padding: 16px;
            box-shadow: var(--card-shadow);
        }
        
        .wishlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .wishlist-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--wishlist-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .wishlist-progress {
            background: var(--badge-bg);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.9rem;
        }
        
        .wishlist-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .wishlist-category {
            flex: 1;
            min-width: 200px;
        }
        
        .wishlist-category-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        
        .wishlist-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .wishlist-option {
            background: var(--badge-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .wishlist-option.selected {
            background: var(--wishlist-color);
            color: white;
            border-color: var(--wishlist-color);
        }
        
        .wishlist-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .wishlist-recommendations {
            background: var(--badge-bg);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .wishlist-recommendations-title {
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        
        .wishlist-products {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .wishlist-product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            flex: 1;
            min-width: 150px;
            cursor: pointer;
        }
        
        .wishlist-product-card:hover {
            box-shadow: var(--card-shadow);
        }
        
        .wishlist-product-model {
            font-weight: bold;
            color: var(--wishlist-color);
        }
        
        .wishlist-product-parts {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .wishlist-clear {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
        }
        
        /* ===== 搜尋框 ===== */
        .search-box {
            background: var(--bg-secondary);
            margin: 0 16px 16px;
            padding: 12px 16px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            display: flex;
            border: 1px solid var(--border-color);
        }
        
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            background: transparent;
            color: var(--text-primary);
        }
        
        /* ===== 下拉選單容器 ===== */
        .dropdowns-container {
            display: flex;
            gap: 12px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
        }
        
        .dropdown {
            position: relative;
            display: inline-block;
            flex: 1;
            min-width: 140px;
        }
        
        .dropdown-button {
            background: var(--dropdown-bg);
            border: 1px solid var(--dropdown-border);
            border-radius: 30px;
            padding: 10px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-primary);
            width: 100%;
        }
        
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            right: 0;
            background: var(--dropdown-bg);
            border: 1px solid var(--dropdown-border);
            border-radius: 16px;
            padding: 8px;
            z-index: 20;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: var(--card-shadow);
        }
        
        .dropdown-menu.show {
            display: block;
        }
        
        .dropdown-item {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 30px;
            margin: 4px 0;
            color: var(--text-primary);
        }
        
        .dropdown-item:hover {
            background: var(--dropdown-hover);
        }
        
        .dropdown-item.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
        }
        
        /* ===== 系列篩選 ===== */
        .filter-section {
            margin: 0 16px 16px;
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        
        .filter-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        /* ===== 排序按鈕 ===== */
        .sort-section {
            display: flex;
            gap: 8px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
        }
        
        .sort-btn {
            background: var(--filter-btn-bg);
            border: 1px solid var(--filter-btn-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-primary);
            flex: 1;
            min-width: 100px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .sort-btn.active {
            background: var(--filter-btn-active-bg);
            color: var(--filter-btn-active-text);
            border-color: var(--filter-btn-active-bg);
        }
        
        .sort-direction {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        /* ===== 統計 ===== */
        .stats {
            background: var(--stats-bg);
            margin: 0 16px 16px;
            padding: 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            min-width: 70px;
        }
        
        .stat-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        /* ===== 產品列表 ===== */
        .product-list {
            margin: 0 16px 20px;
        }
        
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            border-left-width: 4px;
            position: relative;
        }
        
        .product-card.BX { border-left-color: var(--bx-color); }
        .product-card.UX { border-left-color: var(--ux-color); }
        .product-card.CX { border-left-color: var(--cx-color); }
        .product-card:active { transform: scale(0.98); background: var(--badge-bg); }
        
        .product-card.favorite {
            border-left-width: 6px;
            border-left-color: var(--favorite-color);
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .product-model {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-star {
            color: var(--favorite-color);
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .product-type {
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 8px;
            border-radius: 12px;
            color: var(--text-primary);
        }
        
        .product-name {
            font-size: 1rem;
            color: var(--text-secondary);
            margin: 4px 0;
        }
        
        .product-assist-code {
            display: inline-block;
            background: var(--badge-bg);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-right: 8px;
        }
        
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }
        
        .product-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--badge-bg);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .product-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 8px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        
        .data-get-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .data-get-a {
            background: var(--get-a-bg);
            color: var(--get-a-text);
        }
        
        .data-get-j {
            background: var(--get-j-bg);
            color: var(--get-j-text);
        }
        
        .data-get-t {
            background: var(--get-t-bg);
            color: var(--get-t-text);
        }
        
        .data-get-box {
            background: var(--get-box-bg);
            color: var(--get-box-text);
        }
        
        /* ===== 最近瀏覽 ===== */
        .recent-bar {
            background: var(--badge-bg);
            margin: 0 16px 16px;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .recent-item {
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-block;
        }
        
        .recent-item:hover {
            background: var(--filter-btn-active-bg);
            color: white;
        }
        
        /* ===== 模態框 ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
            align-items: flex-end;
        }
        
        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.2s;
            color: var(--text-primary);
            border-top: 1px solid var(--border-color);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .close-btn {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            text-align: center;
            line-height: 36px;
            border-radius: 50%;
            background: var(--close-btn-bg);
            color: var(--text-primary);
        }
        
        /* ===== 詳細頁樣式 ===== */
        .detail-section {
            margin: 20px 0;
        }
        
        .detail-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        
        .lang-tag {
            display: inline-block;
            background: var(--badge-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 4px;
        }
        
        .data-get-info {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 8px;
        }
        
        /* ===== 其他 ===== */
        .loading-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 10px 16px 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>⚙️ Beyblade X 完整查詢 <span id="dataCount">0</span></h1>
        </div>
        <div class="header-right">
            <!-- 語言下拉選單 -->
            <div class="lang-dropdown" id="langDropdown">
                <button class="lang-button" id="langButton">
                    <span id="selectedLang">🇭🇰 港</span>
                    <span>▼</span>
                </button>
                <div class="lang-menu" id="langMenu">
                    <div class="lang-item active" data-lang="zh_hk">🇭🇰 港</div>
                    <div class="lang-item" data-lang="zh_tw">🇨🇳 台</div>
                    <div class="lang-item" data-lang="en">🇬🇧 EN</div>
                    <div class="lang-item" data-lang="jp">🇯🇵 JP</div>
                </div>
            </div>
            <button class="dark-mode-toggle" id="darkModeToggle">🌙 深色</button>
        </div>
    </div>
    
    <!-- 功能按鈕欄 -->
    <div class="action-bar">
        <div class="action-group">
            <button class="action-btn favorite" id="showFavoritesBtn">⭐ 最愛 (<span id="favoriteCount">0</span>)</button>
            <button class="action-btn wishlist" id="showWishlistBtn">📋 零件清單</button>
            <button class="action-btn export" id="exportFavoritesBtn" style="display: none;">📤 匯出最愛</button>
        </div>
    </div>
    
    <!-- 零件收集清單面板 (預設隱藏) -->
    <div class="wishlist-panel" id="wishlistPanel" style="display: none;">
        <div class="wishlist-header">
            <div class="wishlist-title">
                <span>📋 我想收集嘅零件</span>
                <span class="wishlist-progress" id="wishlistProgress">0/12</span>
            </div>
            <span class="wishlist-clear" id="clearWishlistBtn">清除所有</span>
        </div>
        
        <div class="wishlist-items" id="wishlistItems"></div>
        
        <div class="wishlist-recommendations" id="wishlistRecommendations" style="display: none;">
            <div class="wishlist-recommendations-title">🛒 建議購買產品</div>
            <div class="wishlist-products" id="wishlistProducts"></div>
        </div>
    </div>
    
    <!-- 最近瀏覽 -->
    <div class="recent-bar" id="recentBar" style="display: none;">
        <span>🕒 最近瀏覽:</span>
        <div id="recentList"></div>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋型號、名稱...">
    </div>
    
    <!-- 兩個下拉選單並排 -->
    <div class="dropdowns-container">
        <!-- 零件篩選下拉選單 -->
        <div class="dropdown" id="partDropdown">
            <button class="dropdown-button" id="partButton">
                <span id="selectedPart">⚔️ 全部零件</span>
                <span>▼</span>
            </button>
            <div class="dropdown-menu" id="partMenu">
                <div class="dropdown-item active" data-part="all">⚔️ 全部零件</div>
                <div class="dropdown-item" data-part="blade">⚔️ Blade</div>
                <div class="dropdown-item" data-part="ratchet">⚙️ Ratchet</div>
                <div class="dropdown-item" data-part="bit">🔰 Bit</div>
            </div>
        </div>
        
        <!-- 入手方式篩選下拉選單 -->
        <div class="dropdown" id="getDropdown">
            <button class="dropdown-button" id="getButton">
                <span id="selectedGet">📦 全部入手</span>
                <span>▼</span>
            </button>
            <div class="dropdown-menu" id="getMenu">
                <div class="dropdown-item active" data-get="all">📦 全部入手</div>
                <div class="dropdown-item" data-get="A">📱 App</div>
                <div class="dropdown-item" data-get="J">🇯🇵 日本</div>
                <div class="dropdown-item" data-get="T">📦 通販</div>
                <div class="dropdown-item" data-get="box">🎲 抽包</div>
            </div>
        </div>
    </div>
    
    <!-- 系列篩選 -->
    <div class="filter-section">
        <div class="filter-row" id="seriesFilter">
            <button class="filter-btn active" data-type="all">全部系列</button>
            <button class="filter-btn" data-type="BX">BX系列</button>
            <button class="filter-btn" data-type="UX">UX系列</button>
            <button class="filter-btn" data-type="CX">CX系列</button>
        </div>
    </div>
    
    <!-- 排序功能 -->
    <div class="sort-section">
        <button class="sort-btn active" id="sortModel" data-sort="model" data-order="asc">
            📇 型號 <span class="sort-direction">↑</span>
        </button>
        <button class="sort-btn" id="sortRatchet" data-sort="ratchet" data-order="asc">
            ⚙️ Ratchet <span class="sort-direction">↑</span>
        </button>
        <button class="sort-btn" id="sortBit" data-sort="bit" data-order="asc">
            🔰 Bit <span class="sort-direction">↑</span>
        </button>
    </div>
    
    <div id="stats" class="stats"></div>
    <div id="productList" class="product-list">
        <div class="loading-message">⏳ 載入數據中...</div>
    </div>
    
    <div class="footer">
        <div id="updateTime"></div>
    </div>
    
    <div id="detailModal" class="modal" onclick="if(event.target===this) app.hideDetail()">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ==================== 應用程式主物件 ====================
        const app = {
            // 數據
            products: [],
            
            // 狀態
            currentSeries: 'all',
            currentPart: 'all',
            currentGet: 'all',
            searchTerm: '',
            currentLang: 'zh_hk',
            sortMode: 'model',
            sortOrder: 'asc',
            showingFavorites: false,
            
            // 新功能狀態
            favorites: JSON.parse(localStorage.getItem('beyblade_favorites') || '[]'),
            recent: JSON.parse(localStorage.getItem('beyblade_recent') || '[]'),
            wishlist: JSON.parse(localStorage.getItem('beyblade_wishlist') || '{"blade":[],"ratchet":[],"bit":[]}'),
            
            // 可用零件選項
            availableParts: {
                blade: [],
                ratchet: [],
                bit: []
            },
            
            // 數據來源
            dataUrl: 'beyblade_db.json',
            
            // ==================== 初始化 ====================
            init: function() {
                this.loadData();
                this.bindEvents();
                this.updateFavoritesCount();
                this.renderRecentBar();
                this.checkExportButton();
                this.renderWishlistPanel();
            },
            
            // ==================== 綁定事件 ====================
            bindEvents: function() {
                // Dark Mode
                document.getElementById('darkModeToggle').addEventListener('click', () => this.toggleDarkMode());
                
                // 語言下拉選單
                this.setupLangDropdown();
                
                // 零件篩選下拉選單
                this.setupDropdown('partButton', 'partMenu', 'dropdown-item[data-part]', (item) => {
                    const part = item.dataset.part;
                    document.getElementById('selectedPart').innerHTML = item.innerHTML;
                    this.currentPart = part;
                    this.showingFavorites = false;
                    this.render();
                });
                
                // 入手方式下拉選單
                this.setupDropdown('getButton', 'getMenu', 'dropdown-item[data-get]', (item) => {
                    const get = item.dataset.get;
                    document.getElementById('selectedGet').innerHTML = item.innerHTML;
                    this.currentGet = get;
                    this.showingFavorites = false;
                    this.render();
                });
                
                // 系列篩選
                document.querySelectorAll('#seriesFilter .filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('#seriesFilter .filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentSeries = btn.dataset.type;
                        this.showingFavorites = false;
                        this.render();
                    });
                });
                
                // 排序按鈕
                document.getElementById('sortModel').addEventListener('click', (e) => this.handleSort(e.target.closest('.sort-btn'), 'model'));
                document.getElementById('sortRatchet').addEventListener('click', (e) => this.handleSort(e.target.closest('.sort-btn'), 'ratchet'));
                document.getElementById('sortBit').addEventListener('click', (e) => this.handleSort(e.target.closest('.sort-btn'), 'bit'));
                
                // 搜尋輸入
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchTerm = e.target.value;
                    this.showingFavorites = false;
                    this.render();
                });
                
                // 最愛按鈕
                document.getElementById('showFavoritesBtn').addEventListener('click', () => this.toggleFavorites());
                
                // 零件清單按鈕
                document.getElementById('showWishlistBtn').addEventListener('click', () => this.toggleWishlist());
                
                // 清除所有零件
                document.getElementById('clearWishlistBtn').addEventListener('click', () => this.clearWishlist());
                
                // 匯出最愛按鈕
                document.getElementById('exportFavoritesBtn').addEventListener('click', () => this.exportFavorites());
            },
            
            // ==================== Dark Mode ====================
            toggleDarkMode: function() {
                const body = document.body;
                const btn = document.getElementById('darkModeToggle');
                
                if (body.classList.contains('dark-mode')) {
                    body.classList.remove('dark-mode');
                    localStorage.setItem('darkMode', 'disabled');
                    btn.innerHTML = '🌙 深色';
                } else {
                    body.classList.add('dark-mode');
                    localStorage.setItem('darkMode', 'enabled');
                    btn.innerHTML = '☀️ 亮色';
                }
            },
            
            // ==================== 語言下拉選單 ====================
            setupLangDropdown: function() {
                const button = document.getElementById('langButton');
                const menu = document.getElementById('langMenu');
                const selected = document.getElementById('selectedLang');
                
                button.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('show');
                });
                
                document.addEventListener('click', () => menu.classList.remove('show'));
                menu.addEventListener('click', (e) => e.stopPropagation());
                
                document.querySelectorAll('.lang-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.lang-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        this.currentLang = item.dataset.lang;
                        selected.innerHTML = item.innerHTML;
                        menu.classList.remove('show');
                        this.render();
                    });
                });
            },
            
            // ==================== 通用下拉選單 ====================
            setupDropdown: function(buttonId, menuId, itemSelector, callback) {
                const button = document.getElementById(buttonId);
                const menu = document.getElementById(menuId);
                
                button.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.dropdown-menu').forEach(m => {
                        if (m.id !== menuId) m.classList.remove('show');
                    });
                    menu.classList.toggle('show');
                });
                
                document.addEventListener('click', () => menu.classList.remove('show'));
                menu.addEventListener('click', (e) => e.stopPropagation());
                
                document.querySelectorAll(itemSelector).forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll(itemSelector).forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        callback(item);
                        menu.classList.remove('show');
                    });
                });
            },
            
            // ==================== 排序處理 ====================
            handleSort: function(clickedBtn, mode) {
                const currentActive = document.querySelector('.sort-btn.active');
                const orderSpan = clickedBtn.querySelector('.sort-direction');
                
                if (currentActive && currentActive.id === clickedBtn.id) {
                    this.sortOrder = this.sortOrder === 'asc' ? 'desc' : 'asc';
                } else {
                    if (currentActive) currentActive.classList.remove('active');
                    clickedBtn.classList.add('active');
                    this.sortMode = mode;
                    this.sortOrder = 'asc';
                }
                
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    const span = btn.querySelector('.sort-direction');
                    if (btn.id === clickedBtn.id) {
                        span.innerHTML = this.sortOrder === 'asc' ? '↑' : '↓';
                    } else {
                        span.innerHTML = '↑';
                    }
                });
                
                this.render();
            },
            
            // ==================== 載入數據 ====================
            loadData: async function() {
                const listEl = document.getElementById('productList');
                const dataCountEl = document.getElementById('dataCount');
                const updateTimeEl = document.getElementById('updateTime');
                
                try {
                    const response = await fetch(this.dataUrl);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    this.products = Array.isArray(data) ? data : [];
                    
                    // 加入零件類型標記
                    this.products = this.products.map(p => {
                        if (!p.part_type) {
                            if (p.type === 'CX') {
                                p.part_type = 'blade';
                            } else if (p.ratchet && p.ratchet !== '') {
                                p.part_type = 'ratchet';
                            } else if (p.bit_code) {
                                p.part_type = 'bit';
                            } else {
                                p.part_type = 'blade';
                            }
                        }
                        return p;
                    });
                    
                    // 建立可用零件選項
                    this.buildAvailableParts();
                    
                    dataCountEl.textContent = this.products.length;
                    updateTimeEl.innerHTML = `最後更新: ${new Date().toLocaleString('zh-HK')} (共 ${this.products.length} 項)`;
                    
                    this.updateStats();
                    this.render();
                    
                } catch (error) {
                    listEl.innerHTML = `
                        <div style="text-align:center; padding:40px; color:#cc0000;">
                            <h3>📛 無法載入數據</h3>
                            <p>${this.escapeHTML(error.message)}</p>
                            <p>請確保 <code>beyblade_db.json</code> 同 HTML 放埋一齊</p>
                            <button class="filter-btn" style="margin-top:20px;" onclick="location.reload()">🔄 重試</button>
                        </div>
                    `;
                }
            },
            
            // ==================== 建立可用零件選項 ====================
            buildAvailableParts: function() {
                const bladeSet = new Set();
                const ratchetSet = new Set();
                const bitSet = new Set();
                
                this.products.forEach(p => {
                    // Blade 名稱 (main_blade)
                    if (p.main_blade_zh_hk) bladeSet.add(p.main_blade_zh_hk);
                    
                    // Ratchet
                    if (p.ratchet) ratchetSet.add(p.ratchet);
                    
                    // Bit 代碼
                    if (p.bit_code) bitSet.add(p.bit_code);
                });
                
                this.availableParts.blade = Array.from(bladeSet).sort();
                this.availableParts.ratchet = Array.from(ratchetSet).sort();
                this.availableParts.bit = Array.from(bitSet).sort();
            },
            
            // ==================== 更新統計 ====================
            updateStats: function() {
                const total = this.products.length;
                const bx = this.products.filter(p => p.type === 'BX').length;
                const ux = this.products.filter(p => p.type === 'UX').length;
                const cx = this.products.filter(p => p.type === 'CX').length;
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-item">
                        <div class="stat-number">${total}</div>
                        <div class="stat-label">總數</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${bx}</div>
                        <div class="stat-label">BX</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${ux}</div>
                        <div class="stat-label">UX</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${cx}</div>
                        <div class="stat-label">CX</div>
                    </div>
                `;
            },
            
            // ==================== 輔助函數 ====================
            escapeHTML: function(str) {
                if (!str) return '';
                return String(str).replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            },
            
            getNameByLang: function(product, field) {
                if (field === 'chip') {
                    return product[`chip_${this.currentLang}`] || product.chip_zh_hk || product.chip_en || '';
                }
                if (field === 'main') {
                    return product[`main_blade_${this.currentLang}`] || product.main_blade_zh_hk || '';
                }
                if (field === 'metal') {
                    return product[`metal_${this.currentLang}`] || product.metal_zh_hk || '';
                }
                if (field === 'over') {
                    return product[`over_${this.currentLang}`] || product.over_zh_hk || '';
                }
                if (field === 'assist') {
                    return product[`assist_blade_${this.currentLang}`] || product.assist_blade_zh_hk || '';
                }
                if (field === 'bit') {
                    return product[`bit_name_${this.currentLang}`] || product.bit_name_zh_hk || product.bit_name_en || '';
                }
                return '';
            },
            
            getDataGetClass: function(dataGet) {
                if (!dataGet || dataGet === '') return 'data-get-t';
                if (dataGet === 'A') return 'data-get-a';
                if (dataGet === 'J') return 'data-get-j';
                if (dataGet.match(/^×\d+$/)) return 'data-get-box';
                return 'data-get-t';
            },
            
            getDataGetDisplay: function(dataGet) {
                if (!dataGet || dataGet === '') return '📦 通販';
                if (dataGet === 'A') return '📱 App';
                if (dataGet === 'J') return '🇯🇵 日本';
                if (dataGet === '×3') return '🎲 3入';
                if (dataGet === '×4') return '🎲 4入';
                if (dataGet === '×5') return '🎲 5入';
                if (dataGet === '×8') return '🎲 8入';
                if (dataGet === '×12') return '🎲 12入';
                return '📦 通販';
            },
            
            // ==================== 最愛功能 ====================
            toggleFavorite: function(model, event) {
                if (event) event.stopPropagation();
                
                const index = this.favorites.indexOf(model);
                if (index === -1) {
                    this.favorites.push(model);
                } else {
                    this.favorites.splice(index, 1);
                }
                
                localStorage.setItem('beyblade_favorites', JSON.stringify(this.favorites));
                this.updateFavoritesCount();
                this.checkExportButton();
                this.render();
            },
            
            updateFavoritesCount: function() {
                document.getElementById('favoriteCount').textContent = this.favorites.length;
            },
            
            checkExportButton: function() {
                const exportBtn = document.getElementById('exportFavoritesBtn');
                if (this.favorites.length > 0) {
                    exportBtn.style.display = 'inline-flex';
                } else {
                    exportBtn.style.display = 'none';
                }
            },
            
            isFavorite: function(model) {
                return this.favorites.includes(model);
            },
            
            toggleFavorites: function() {
                if (this.favorites.length === 0) {
                    alert('你仲未有最愛產品 ⭐\n點擊產品上的星星就可以加入最愛！');
                    return;
                }
                
                this.showingFavorites = !this.showingFavorites;
                
                const btn = document.getElementById('showFavoritesBtn');
                if (this.showingFavorites) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
                
                this.render();
            },
            
            // ==================== 匯出最愛 ====================
            exportFavorites: function() {
                if (this.favorites.length === 0) {
                    alert('沒有最愛產品可以匯出');
                    return;
                }
                
                const favoriteProducts = this.products.filter(p => this.favorites.includes(p.model));
                
                let text = 'Beyblade X 最愛產品清單\n';
                text += `產生時間: ${new Date().toLocaleString('zh-HK')}\n`;
                text += `總共 ${favoriteProducts.length} 項\n`;
                text += '='.repeat(40) + '\n\n';
                
                favoriteProducts.forEach(p => {
                    text += `${p.model} - ${p.main_blade_zh_hk || ''}\n`;
                    text += `  Ratchet: ${p.ratchet || '—'}\n`;
                    text += `  Bit: ${p.bit_code || '—'} ${p.bit_name_zh_hk || ''}\n`;
                    text += `  入手: ${this.getDataGetDisplay(p.data_get)}\n`;
                    text += '-'.repeat(30) + '\n';
                });
                
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `beyblade_favorites_${new Date().getTime()}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            },
            
            // ==================== 最近瀏覽 ====================
            addToRecent: function(model) {
                this.recent = this.recent.filter(m => m !== model);
                this.recent.unshift(model);
                if (this.recent.length > 10) this.recent.pop();
                
                localStorage.setItem('beyblade_recent', JSON.stringify(this.recent));
                this.renderRecentBar();
            },
            
            renderRecentBar: function() {
                const bar = document.getElementById('recentBar');
                const listEl = document.getElementById('recentList');
                
                if (this.recent.length === 0) {
                    bar.style.display = 'none';
                    return;
                }
                
                bar.style.display = 'flex';
                
                let html = '';
                this.recent.forEach(model => {
                    const product = this.products.find(p => p.model === model);
                    if (product) {
                        const name = product.main_blade_zh_hk || product.model;
                        html += `<span class="recent-item" onclick="app.showDetail('${model}')">${this.escapeHTML(name)}</span>`;
                    }
                });
                
                listEl.innerHTML = html;
            },
            
            // ==================== 零件收集清單 ====================
            toggleWishlist: function() {
                const panel = document.getElementById('wishlistPanel');
                if (panel.style.display === 'none') {
                    panel.style.display = 'block';
                    this.renderWishlistPanel();
                } else {
                    panel.style.display = 'none';
                }
            },
            
            renderWishlistPanel: function() {
                const panel = document.getElementById('wishlistItems');
                const progress = document.getElementById('wishlistProgress');
                
                // 計算總數
                const totalSelected = this.wishlist.blade.length + this.wishlist.ratchet.length + this.wishlist.bit.length;
                progress.textContent = `${totalSelected}/12`;
                
                let html = '';
                
                // Blade 部分
                html += `
                    <div class="wishlist-category">
                        <div class="wishlist-category-title">⚔️ Blade</div>
                        <div class="wishlist-options">
                `;
                
                this.availableParts.blade.slice(0, 8).forEach(blade => {
                    const selected = this.wishlist.blade.includes(blade);
                    html += `<span class="wishlist-option ${selected ? 'selected' : ''}" onclick="app.toggleWishlistItem('blade', '${blade}')">${blade}</span>`;
                });
                
                html += `</div></div>`;
                
                // Ratchet 部分
                html += `
                    <div class="wishlist-category">
                        <div class="wishlist-category-title">⚙️ Ratchet</div>
                        <div class="wishlist-options">
                `;
                
                this.availableParts.ratchet.slice(0, 8).forEach(ratchet => {
                    const selected = this.wishlist.ratchet.includes(ratchet);
                    html += `<span class="wishlist-option ${selected ? 'selected' : ''}" onclick="app.toggleWishlistItem('ratchet', '${ratchet}')">${ratchet}</span>`;
                });
                
                html += `</div></div>`;
                
                // Bit 部分
                html += `
                    <div class="wishlist-category">
                        <div class="wishlist-category-title">🔰 Bit</div>
                        <div class="wishlist-options">
                `;
                
                this.availableParts.bit.slice(0, 8).forEach(bit => {
                    const selected = this.wishlist.bit.includes(bit);
                    html += `<span class="wishlist-option ${selected ? 'selected' : ''}" onclick="app.toggleWishlistItem('bit', '${bit}')">${bit}</span>`;
                });
                
                html += `</div></div>`;
                
                panel.innerHTML = html;
                
                // 更新推薦產品
                this.updateWishlistRecommendations();
            },
            
            toggleWishlistItem: function(category, value) {
                const index = this.wishlist[category].indexOf(value);
                if (index === -1) {
                    if (this.getTotalWishlistCount() >= 12) {
                        alert('最多可以揀 12 個零件！');
                        return;
                    }
                    this.wishlist[category].push(value);
                } else {
                    this.wishlist[category].splice(index, 1);
                }
                
                localStorage.setItem('beyblade_wishlist', JSON.stringify(this.wishlist));
                this.renderWishlistPanel();
            },
            
            getTotalWishlistCount: function() {
                return this.wishlist.blade.length + this.wishlist.ratchet.length + this.wishlist.bit.length;
            },
            
            clearWishlist: function() {
                if (confirm('確定要清除所有已選零件？')) {
                    this.wishlist = { blade: [], ratchet: [], bit: [] };
                    localStorage.setItem('beyblade_wishlist', JSON.stringify(this.wishlist));
                    this.renderWishlistPanel();
                }
            },
            
            updateWishlistRecommendations: function() {
                const recommendationsDiv = document.getElementById('wishlistRecommendations');
                const productsDiv = document.getElementById('wishlistProducts');
                
                const totalSelected = this.getTotalWishlistCount();
                
                if (totalSelected === 0) {
                    recommendationsDiv.style.display = 'none';
                    return;
                }
                
                // 尋找可以滿足最多已選零件的產品
                const productScores = [];
                
                this.products.forEach(p => {
                    let score = 0;
                    const parts = [];
                    
                    // 檢查 Blade
                    if (p.main_blade_zh_hk && this.wishlist.blade.includes(p.main_blade_zh_hk)) {
                        score++;
                        parts.push(`⚔️ ${p.main_blade_zh_hk}`);
                    }
                    
                    // 檢查 Ratchet
                    if (p.ratchet && this.wishlist.ratchet.includes(p.ratchet)) {
                        score++;
                        parts.push(`⚙️ ${p.ratchet}`);
                    }
                    
                    // 檢查 Bit
                    if (p.bit_code && this.wishlist.bit.includes(p.bit_code)) {
                        score++;
                        parts.push(`🔰 ${p.bit_code}`);
                    }
                    
                    if (score > 0) {
                        productScores.push({
                            product: p,
                            score: score,
                            parts: parts
                        });
                    }
                });
                
                // 按分數排序
                productScores.sort((a, b) => b.score - a.score);
                
                if (productScores.length === 0) {
                    recommendationsDiv.style.display = 'none';
                    return;
                }
                
                recommendationsDiv.style.display = 'block';
                
                let html = '';
                productScores.slice(0, 3).forEach(ps => {
                    html += `
                        <div class="wishlist-product-card" onclick="app.showDetail('${ps.product.model}')">
                            <div class="wishlist-product-model">${ps.product.model}</div>
                            <div>${ps.product.main_blade_zh_hk || ''}</div>
                            <div class="wishlist-product-parts">${ps.parts.join(' · ')}</div>
                            <div style="font-size:0.8rem; margin-top:4px;">✅ 滿足 ${ps.score} 個零件</div>
                        </div>
                    `;
                });
                
                productsDiv.innerHTML = html;
            },
            
            // ==================== 過濾產品 ====================
            getFilteredProducts: function() {
                if (this.showingFavorites) {
                    return this.products.filter(p => this.favorites.includes(p.model));
                }
                
                return this.products.filter(p => {
                    if (this.currentSeries !== 'all' && p.type !== this.currentSeries) return false;
                    if (this.currentPart !== 'all' && p.part_type !== this.currentPart) return false;
                    
                    if (this.currentGet !== 'all') {
                        if (this.currentGet === 'A' && p.data_get !== 'A') return false;
                        if (this.currentGet === 'J' && p.data_get !== 'J') return false;
                        if (this.currentGet === 'T' && p.data_get && p.data_get !== '') return false;
                        if (this.currentGet === 'box' && (!p.data_get || !p.data_get.match(/^×\d+$/))) return false;
                    }
                    
                    if (this.searchTerm) {
                        const term = this.searchTerm.toLowerCase();
                        return (p.model && p.model.toLowerCase().includes(term)) ||
                               (p.main_blade_zh_hk && p.main_blade_zh_hk.toLowerCase().includes(term)) ||
                               (p.main_blade_en && p.main_blade_en.toLowerCase().includes(term)) ||
                               (p.chip_zh_hk && p.chip_zh_hk.toLowerCase().includes(term)) ||
                               (p.assist_blade_code && p.assist_blade_code.toLowerCase().includes(term)) ||
                               (p.ratchet && p.ratchet.toLowerCase().includes(term)) ||
                               (p.bit_code && p.bit_code.toLowerCase().includes(term));
                    }
                    return true;
                });
            },
            
            // ==================== 排序產品 ====================
            sortProducts: function(productsToSort) {
                const sorted = [...productsToSort];
                
                sorted.sort((a, b) => {
                    let compareResult = 0;
                    
                    if (this.sortMode === 'model') {
                        compareResult = a.model.localeCompare(b.model);
                    } else if (this.sortMode === 'ratchet') {
                        const aVal = a.ratchet || '';
                        const bVal = b.ratchet || '';
                        if (aVal && bVal) {
                            compareResult = aVal.localeCompare(bVal);
                        } else if (aVal) {
                            compareResult = -1;
                        } else if (bVal) {
                            compareResult = 1;
                        }
                    } else if (this.sortMode === 'bit') {
                        const aVal = a.bit_code || '';
                        const bVal = b.bit_code || '';
                        if (aVal && bVal) {
                            compareResult = aVal.localeCompare(bVal);
                        } else if (aVal) {
                            compareResult = -1;
                        } else if (bVal) {
                            compareResult = 1;
                        }
                    }
                    
                    return this.sortOrder === 'asc' ? compareResult : -compareResult;
                });
                
                return sorted;
            },
            
            // ==================== 渲染 ====================
            render: function() {
                let filtered = this.getFilteredProducts();
                filtered = this.sortProducts(filtered);
                
                const listEl = document.getElementById('productList');
                
                if (filtered.length === 0) {
                    if (this.showingFavorites) {
                        listEl.innerHTML = '<div class="loading-message">⭐ 你最愛清單仲係空嘅</div>';
                    } else {
                        listEl.innerHTML = '<div class="loading-message">🔍 沒有符合的產品</div>';
                    }
                    return;
                }
                
                let html = '';
                filtered.forEach(p => {
                    const chipName = this.escapeHTML(this.getNameByLang(p, 'chip'));
                    const mainName = this.escapeHTML(this.getNameByLang(p, 'main'));
                    const metalName = this.escapeHTML(this.getNameByLang(p, 'metal'));
                    const overName = this.escapeHTML(this.getNameByLang(p, 'over'));
                    const assistName = this.escapeHTML(this.getNameByLang(p, 'assist'));
                    const assistCode = p.assist_blade_code ? this.escapeHTML(p.assist_blade_code) : '';
                    const bitName = this.escapeHTML(this.getNameByLang(p, 'bit'));
                    
                    let nameHtml = '';
                    let tags = '';
                    let assistCodeHtml = '';
                    
                    if (p.type === 'CX') {
                        const parts = [];
                        if (chipName) parts.push(chipName);
                        if (mainName) parts.push(mainName);
                        if (metalName) parts.push(metalName);
                        if (overName) parts.push(overName);
                        if (assistName) parts.push(assistName);
                        nameHtml = parts.join(' · ');
                        
                        if (assistCode) {
                            assistCodeHtml = `<span class="product-assist-code">🔪 ${assistCode}</span>`;
                        }
                        
                        if (metalName) {
                            tags += `<span class="product-tag">⚙️ ${metalName}</span>`;
                        }
                        if (overName) {
                            tags += `<span class="product-tag">⬆️ ${overName}</span>`;
                        }
                    } else {
                        nameHtml = mainName;
                    }
                    
                    const dataGetClass = this.getDataGetClass(p.data_get);
                    const dataGetDisplay = this.getDataGetDisplay(p.data_get);
                    const isFav = this.isFavorite(p.model);
                    
                    html += `
                        <div class="product-card ${this.escapeHTML(p.type)} ${isFav ? 'favorite' : ''}" onclick="app.showDetail('${this.escapeHTML(p.model)}')">
                            <div class="product-header">
                                <span class="product-model">
                                    ${this.escapeHTML(p.model)} ${assistCodeHtml}
                                    <span class="favorite-star" onclick="app.toggleFavorite('${this.escapeHTML(p.model)}', event)">${isFav ? '⭐' : '☆'}</span>
                                </span>
                                <span class="product-type">${this.escapeHTML(p.type)}</span>
                            </div>
                            <div class="product-name">${nameHtml}</div>
                            ${tags ? `<div class="product-tags">${tags}</div>` : ''}
                            <div class="product-specs">
                                ${p.ratchet ? `<span>⚙️ ${this.escapeHTML(p.ratchet)}</span>` : ''}
                                ${p.bit_code ? `<span>🔰 ${this.escapeHTML(p.bit_code)}</span>` : ''}
                                ${bitName ? `<span>${bitName}</span>` : ''}
                            </div>
                            <div class="product-footer">
                                <span class="data-get-badge ${dataGetClass}">${this.escapeHTML(dataGetDisplay)}</span>
                            </div>
                        </div>
                    `;
                });
                
                listEl.innerHTML = html;
            },
            
            // ==================== 顯示詳細 ====================
            showDetail: function(model) {
                const product = this.products.find(p => p.model === model);
                if (!product) return;
                
                this.addToRecent(model);
                
                const dataGetClass = this.getDataGetClass(product.data_get);
                const dataGetDisplay = this.getDataGetDisplay(product.data_get);
                const isFav = this.isFavorite(model);
                
                let content = `
                    <span class="close-btn" onclick="app.hideDetail()">&times;</span>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="margin-top:0;">${this.escapeHTML(product.model)}</h2>
                        <span class="favorite-star" style="font-size:2rem; cursor:pointer;" onclick="app.toggleFavorite('${this.escapeHTML(product.model)}', event)">${isFav ? '⭐' : '☆'}</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
                        <span style="background:var(--badge-bg); padding:4px 12px; border-radius:20px;">${this.escapeHTML(product.type)} 系列</span>
                        <span style="background:var(--badge-bg); padding:4px 12px; border-radius:20px;">零件: ${this.escapeHTML(product.part_type)}</span>
                    </div>
                `;
                
                if (product.type === 'CX' && product.chip_zh_hk) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">📝 本體名稱 (Chip)</div>
                            <div><span class="lang-tag">🇭🇰 港</span> ${this.escapeHTML(product.chip_zh_hk) || '—'}</div>
                            <div><span class="lang-tag">🇨🇳 台</span> ${this.escapeHTML(product.chip_zh_tw) || '—'}</div>
                            <div><span class="lang-tag">🇬🇧 英</span> ${this.escapeHTML(product.chip_en) || '—'}</div>
                            <div><span class="lang-tag">🇯🇵 日</span> ${this.escapeHTML(product.chip_jp) || '—'}</div>
                        </div>
                    `;
                }
                
                if (product.metal_zh_hk) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">⚙️ Metal</div>
                            <div><span class="lang-tag">🇭🇰 港</span> ${this.escapeHTML(product.metal_zh_hk) || '—'}</div>
                            <div><span class="lang-tag">🇨🇳 台</span> ${this.escapeHTML(product.metal_zh_tw) || '—'}</div>
                            <div><span class="lang-tag">🇬🇧 英</span> ${this.escapeHTML(product.metal_en) || '—'}</div>
                            <div><span class="lang-tag">🇯🇵 日</span> ${this.escapeHTML(product.metal_jp) || '—'}</div>
                        </div>
                    `;
                }
                
                if (product.over_zh_hk) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">⬆️ Over</div>
                            <div><span class="lang-tag">🇭🇰 港</span> ${this.escapeHTML(product.over_zh_hk) || '—'}</div>
                            <div><span class="lang-tag">🇨🇳 台</span> ${this.escapeHTML(product.over_zh_tw) || '—'}</div>
                            <div><span class="lang-tag">🇬🇧 英</span> ${this.escapeHTML(product.over_en) || '—'}</div>
                            <div><span class="lang-tag">🇯🇵 日</span> ${this.escapeHTML(product.over_jp) || '—'}</div>
                        </div>
                    `;
                }
                
                if (product.main_blade_zh_hk) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">⚔️ 主 blade</div>
                            <div><span class="lang-tag">🇭🇰 港</span> ${this.escapeHTML(product.main_blade_zh_hk) || '—'}</div>
                            <div><span class="lang-tag">🇨🇳 台</span> ${this.escapeHTML(product.main_blade_zh_tw) || '—'}</div>
                            <div><span class="lang-tag">🇬🇧 英</span> ${this.escapeHTML(product.main_blade_en) || '—'}</div>
                            <div><span class="lang-tag">🇯🇵 日</span> ${this.escapeHTML(product.main_blade_jp) || '—'}</div>
                        </div>
                    `;
                }
                
                if (product.assist_blade_zh_hk) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">🔪 輔助刀 (Assist Blade)</div>
                            <div><strong>代碼:</strong> ${this.escapeHTML(product.assist_blade_code) || '—'}</div>
                            <div><span class="lang-tag">🇭🇰 港</span> ${this.escapeHTML(product.assist_blade_zh_hk) || '—'}</div>
                            <div><span class="lang-tag">🇨🇳 台</span> ${this.escapeHTML(product.assist_blade_zh_tw) || '—'}</div>
                            <div><span class="lang-tag">🇬🇧 英</span> ${this.escapeHTML(product.assist_blade_en) || '—'}</div>
                            <div><span class="lang-tag">🇯🇵 日</span> ${this.escapeHTML(product.assist_blade_jp) || '—'}</div>
                        </div>
                    `;
                }
                
                if (product.ratchet) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">⚙️ Ratchet</div>
                            <div style="font-size:1.2rem;">${this.escapeHTML(product.ratchet)}</div>
                        </div>
                    `;
                }
                
                if (product.bit_code) {
                    content += `
                        <div class="detail-section">
                            <div class="detail-title">🔰 Bit</div>
                            <div><strong>代碼:</strong> ${this.escapeHTML(product.bit_code)}</div>
                            <div><span class="lang-tag">🇭🇰 港</span> ${this.escapeHTML(product.bit_name_zh_hk) || '—'}</div>
                            <div><span class="lang-tag">🇨🇳 台</span> ${this.escapeHTML(product.bit_name_zh_tw) || '—'}</div>
                            <div><span class="lang-tag">🇬🇧 英</span> ${this.escapeHTML(product.bit_name_en) || '—'}</div>
                            <div><span class="lang-tag">🇯🇵 日</span> ${this.escapeHTML(product.bit_name_jp) || '—'}</div>
                        </div>
                    `;
                }
                
                content += `
                    <div class="detail-section">
                        <div class="detail-title">📦 入手方式</div>
                        <div class="data-get-info ${dataGetClass}">${this.escapeHTML(dataGetDisplay)}</div>
                    </div>
                `;
                
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('detailModal').classList.add('show');
            },
            
            // ==================== 隱藏詳細 ====================
            hideDetail: function() {
                document.getElementById('detailModal').classList.remove('show');
            }
        };

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').innerHTML = '☀️ 亮色';
            }
            
            window.app = app;
            app.init();
        });
    </script>
</body>
</html>
